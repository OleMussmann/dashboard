# Update hostnames and URLs to match your environment.

- Infrastructure:
    - bubbles:
        icon: si-nixos
        widget:
          type: customapi
          url: http://dashboard-api:8080/api/v1/status/bubbles
          mappings:
            - field: status
              label: Status
            - field: metrics.uptime_hours
              label: Uptime
              format: number
              suffix: "h"
            - field: metrics.disk_used_percent
              label: Disk
              format: percent

